<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS-700 · Managing Teams & Environment</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --card: #131c2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .header {
    padding: 2rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    position: relative;
  }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    border: 1px solid rgba(0,212,255,0.2);
    padding: 0.3rem 0.7rem;
    border-radius: 4px;
    text-transform: uppercase;
  }

  .title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
  }

  .subtitle {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 400;
    margin-top: 0.15rem;
  }

  .progress-bar-wrap {
    margin: 0 2rem;
    padding: 1.2rem 0 0.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .main {
    max-width: 820px;
    margin: 0 auto;
    padding: 1.5rem 2rem 4rem;
  }

  /* Category pill */
  .category-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(0,212,255,0.07);
    border: 1px solid rgba(0,212,255,0.15);
    padding: 0.3rem 0.8rem;
    border-radius: 99px;
    margin-bottom: 1.2rem;
  }

  .question-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 0.6rem;
    letter-spacing: 0.08em;
  }

  .question-text {
    font-size: 1.1rem;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 1.8rem;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 0.9rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    cursor: pointer;
    transition: all 0.18s ease;
    position: relative;
    overflow: hidden;
  }

  .option::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,212,255,0.04), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .option:hover:not(.disabled)::before { opacity: 1; }
  .option:hover:not(.disabled) {
    border-color: rgba(0,212,255,0.35);
    transform: translateX(3px);
  }

  .option-key {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.18s;
  }

  .option-text {
    font-size: 0.9rem;
    line-height: 1.5;
    color: #c4d0e3;
    font-weight: 400;
  }

  /* States */
  .option.correct {
    border-color: var(--green);
    background: rgba(16,185,129,0.08);
  }
  .option.correct .option-key {
    background: var(--green);
    color: #fff;
    border-color: var(--green);
  }

  .option.wrong {
    border-color: var(--red);
    background: rgba(239,68,68,0.08);
  }
  .option.wrong .option-key {
    background: var(--red);
    color: #fff;
    border-color: var(--red);
  }

  .option.disabled { cursor: default; pointer-events: none; }
  .option.reveal { border-color: rgba(16,185,129,0.4); }

  /* Explanation */
  .explanation {
    margin-top: 1.2rem;
    background: rgba(0,212,255,0.05);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 1rem 1.2rem;
    font-size: 0.85rem;
    line-height: 1.6;
    color: #94a3b8;
    display: none;
    animation: fadeSlide 0.3s ease;
  }

  .explanation.show { display: block; }
  .explanation strong { color: var(--accent); font-weight: 600; }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Nav buttons */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 2rem;
    gap: 1rem;
  }

  .btn {
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0.7rem 1.5rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.18s ease;
    letter-spacing: 0.02em;
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  /* Score screen */
  #score-screen {
    display: none;
    text-align: center;
    padding: 3rem 1rem;
    animation: fadeSlide 0.5s ease;
  }

  .score-ring {
    width: 140px;
    height: 140px;
    margin: 0 auto 2rem;
    position: relative;
  }

  .score-ring svg { transform: rotate(-90deg); }

  .score-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .score-pct {
    font-size: 2.2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .score-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .score-title {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  .score-sub {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 2.5rem;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 2.5rem;
  }

  .stat {
    text-align: center;
  }

  .stat-val {
    font-size: 1.6rem;
    font-weight: 700;
  }

  .stat-val.g { color: var(--green); }
  .stat-val.r { color: var(--red); }

  .stat-name {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
  }

  .topic-breakdown {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    text-align: left;
  }

  .topic-breakdown h3 {
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .topic-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 0.6rem;
  }

  .topic-name {
    font-size: 0.8rem;
    color: var(--text);
    width: 220px;
    flex-shrink: 0;
  }

  .topic-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .topic-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
  }

  .topic-score {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    width: 40px;
    text-align: right;
  }

  /* Pulse animation on correct */
  @keyframes pulse-green {
    0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
    70% { box-shadow: 0 0 0 10px rgba(16,185,129,0); }
    100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
  }
  .option.correct { animation: pulse-green 0.6s ease; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="badge">MS-700</div>
  </div>
  <div>
    <div class="title">Managing Teams &amp; Environment</div>
    <div class="subtitle">Microsoft Teams Administrator — Focused Quiz</div>
  </div>
</div>

<div class="progress-bar-wrap">
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progress-label">0 / 30</div>
</div>

<div class="main">
  <div id="quiz-screen">
    <div class="category-pill" id="cat-pill">📂 Category</div>
    <div class="question-num" id="q-num">Question 1 of 30</div>
    <div class="question-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <div class="explanation" id="explanation"></div>
    <div class="nav">
      <button class="btn btn-ghost" id="btn-prev" onclick="navigate(-1)">← Previous</button>
      <button class="btn btn-primary" id="btn-next" onclick="navigate(1)" disabled>Next →</button>
    </div>
  </div>

  <div id="score-screen">
    <div class="score-ring">
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle cx="70" cy="70" r="58" fill="none" stroke="#1e2d45" stroke-width="10"/>
        <circle cx="70" cy="70" r="58" fill="none" stroke="url(#grad)" stroke-width="10"
          stroke-linecap="round" stroke-dasharray="364.4" id="ring-dash" stroke-dashoffset="364.4"/>
        <defs>
          <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#7c3aed"/>
            <stop offset="100%" stop-color="#00d4ff"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="score-inner">
        <div class="score-pct" id="score-pct">0%</div>
        <div class="score-label">SCORE</div>
      </div>
    </div>
    <div class="score-title" id="score-title">Quiz Complete!</div>
    <div class="score-sub" id="score-sub"></div>
    <div class="stats-row">
      <div class="stat"><div class="stat-val g" id="stat-correct">0</div><div class="stat-name">CORRECT</div></div>
      <div class="stat"><div class="stat-val r" id="stat-wrong">0</div><div class="stat-name">WRONG</div></div>
      <div class="stat"><div class="stat-val" id="stat-total" style="color:var(--accent)">30</div><div class="stat-name">TOTAL</div></div>
    </div>
    <div class="topic-breakdown" id="topic-breakdown"></div>
    <button class="btn btn-primary" onclick="restartQuiz()" style="font-size:0.95rem;padding:0.9rem 2.5rem;">
      🔄 Retake Quiz
    </button>
  </div>
</div>

<script>
const questions = [
  // ── Managing Teams ──
  {
    cat: "🏢 Managing Teams",
    q: "An administrator needs to prevent users from creating new teams unless approved by IT. What is the best approach?",
    opts: [
      "Disable Microsoft 365 group creation for all users except an approved security group",
      "Set Teams to read-only mode in the Teams admin center",
      "Remove all users from the Global Administrators role",
      "Enable guest access restrictions in Azure AD"
    ],
    ans: 0,
    exp: "<strong>Correct.</strong> Controlling Team creation is done by restricting Microsoft 365 Group creation to a specific security group in Azure AD. Teams relies on M365 Groups, so limiting group creation limits team creation."
  },
  {
    cat: "🏢 Managing Teams",
    q: "A team owner wants to archive a team that is no longer active. What happens to the team content after archiving?",
    opts: [
      "All files and messages are permanently deleted after 30 days",
      "The team becomes read-only; users can still view content but cannot post",
      "All members are removed and the team is hidden from search",
      "The team is moved to a separate archive tenant"
    ],
    ans: 1,
    exp: "<strong>Correct.</strong> Archiving a team makes it read-only. Members can still browse channels, files, and chat history, but cannot send new messages or add tabs until the team is unarchived."
  },
  {
    cat: "🏢 Managing Teams",
    q: "You need to create 200 teams automatically for new projects using a consistent naming format. What is the most efficient method?",
    opts: [
      "Have users manually create teams and rename them",
      "Use Teams templates from the admin center",
      "Use PowerShell or Microsoft Graph API to provision teams in bulk",
      "Create a team and clone it 199 times via the Teams desktop client"
    ],
    ans: 2,
    exp: "<strong>Correct.</strong> Bulk team provisioning is best handled via PowerShell (New-Team cmdlet) or the Microsoft Graph API, allowing automated creation with consistent naming, channels, and settings."
  },
  {
    cat: "🏢 Managing Teams",
    q: "A team has been accidentally deleted. Within how many days can it be restored by an administrator?",
    opts: ["7 days", "14 days", "30 days", "90 days"],
    ans: 2,
    exp: "<strong>Correct.</strong> Deleted teams (and the underlying Microsoft 365 Group) can be restored within <strong>30 days</strong> before they are permanently purged."
  },
  {
    cat: "🏢 Managing Teams",
    q: "Which role allows a user to manage team settings, add/remove members, and delete channels — but NOT access the Teams admin center?",
    opts: [
      "Teams Service Administrator",
      "Global Administrator",
      "Team Owner",
      "Teams Communications Administrator"
    ],
    ans: 2,
    exp: "<strong>Correct.</strong> A <strong>Team Owner</strong> has elevated permissions within their specific team (manage members, channels, settings) but has no access to the Teams admin center or tenant-wide settings."
  },
  {
    cat: "🏢 Managing Teams",
    q: "Your organization uses sensitivity labels. You want to ensure teams labeled 'Confidential' block guest access automatically. What must you configure?",
    opts: [
      "A Conditional Access policy targeting guests",
      "Sensitivity label settings that include external sharing and guest access controls",
      "A DLP policy with the Confidential label as a condition",
      "Azure AD B2B collaboration settings"
    ],
    ans: 1,
    exp: "<strong>Correct.</strong> Sensitivity labels in Microsoft 365 can enforce privacy, external sharing, and <strong>guest access settings</strong> on Microsoft 365 Groups and Teams. When the label is applied, guest access is automatically controlled."
  },
  {
    cat: "🏢 Managing Teams",
    q: "An admin wants to enforce a naming policy so all new teams include the department name as a prefix (e.g., 'HR-ProjectAlpha'). Where is this configured?",
    opts: [
      "Teams admin center > Teams settings > Naming policy",
      "Azure Active Directory > Groups > Naming policy",
      "Microsoft 365 admin center > Settings > Org settings",
      "Exchange admin center > Distribution groups"
    ],
    ans: 1,
    exp: "<strong>Correct.</strong> Group naming policies are configured in <strong>Azure Active Directory > Groups > Naming policy</strong>. Since Teams are backed by M365 Groups, this policy applies to new team names."
  },
  {
    cat: "🏢 Managing Teams",
    q: "A team owner reports that they cannot add a guest user to their team. What is the most likely cause?",
    opts: [
      "The team has reached the maximum member limit of 25,000",
      "Guest access is disabled at the tenant, Microsoft 365, or Teams level",
      "The guest's email domain is a Microsoft 365 tenant",
      "The team is using a private channel which blocks guests"
    ],
    ans: 1,
    exp: "<strong>Correct.</strong> Guest access must be enabled at three levels: <strong>Azure AD, Microsoft 365 Groups, and Teams admin center</strong>. If any one level is disabled, guests cannot be added even if the team owner tries."
  },

  // ── Managing Channels ──
  {
    cat: "📡 Channels & Messaging",
    q: "A user needs a private space within a team where only selected members can see conversations and files. What should you create?",
    opts: [
      "A new team with restricted membership",
      "A private channel within the existing team",
      "A shared channel with external access disabled",
      "A moderated standard channel"
    ],
    ans: 1,
    exp: "<strong>Correct.</strong> <strong>Private channels</strong> allow a subset of team members to communicate and share files in a space that is hidden from other team members. Each private channel gets its own SharePoint site collection."
  },
  {
    cat: "📡 Channels & Messaging",
    q: "You want users from two separate Teams tenants to collaborate in the same channel without switching tenants. What feature enables this?",
    opts: [
      "Guest access",
      "Federated access (External access)",
      "Shared channels (Teams Connect)",
      "Cross-tenant synchronization"
    ],
    ans: 2,
    exp: "<strong>Correct.</strong> <strong>Shared channels (Teams Connect)</strong> allow users from different Azure AD tenants to collaborate in the same channel using their own identity, without switching tenants or signing in as a guest."
  },
  {
    cat: "📡 Channels & Messaging",
    q: "An admin wants to prevent standard users from creating private channels across the entire organization. Where is this setting configured?",
    opts: [
      "Teams policy in the Teams admin center > Teams policies",
      "Channel settings within each individual team",
      "Azure AD > Enterprise applications",
      "Microsoft 365 admin center > Active users"
    ],
    ans: 0,
    exp: "<strong>Correct.</strong> The ability to create private or shared channels is controlled via <strong>Teams policies</strong> in the Teams admin center. Admins can disable this for all or specific users."
  },
  {
    cat: "📡 Channels & Messaging",
    q: "Which statement correctly describes a moderated channel in Teams?",
    opts: [
      "Only members with the Moderator role can view messages in the channel",
      "Moderators control who can post new messages; others can only reply",
      "The channel content is reviewed by a compliance officer before publishing",
      "Standard members receive read-only access; only owners can post"
    ],
    ans: 1,
    exp: "<strong>Correct.</strong> In a <strong>moderated channel</strong>, designated moderators control who can post new messages. Non-moderators can reply to conversations but cannot start new ones."
  },

  // ── Managing Environment & Policies ──
  {
    cat: "⚙️ Environment & Policies",
    q: "You need to apply different messaging settings to executives (who need all features) versus frontline workers (who need a limited set). What is the correct approach?",
    opts: [
      "Create two separate Teams tenants for each group",
      "Create custom messaging policies and assign them to the respective groups",
      "Use Conditional Access policies based on user role",
      "Edit the Global (Org-wide default) policy twice"
    ],
    ans: 1,
    exp: "<strong>Correct.</strong> Teams uses a policy-based model. You create <strong>custom messaging policies</strong> with the desired settings and assign them to specific users or groups. The Global policy applies to users with no explicit assignment."
  },
  {
    cat: "⚙️ Environment & Policies",
    q: "A company wants to ensure all Teams meetings are recorded and that recordings are stored in a specific SharePoint location. Which policy controls recording behavior?",
    opts: [
      "Live events policy",
      "Meeting policy (Teams admin center)",
      "Compliance recording policy via Azure Communication Services",
      "Information barriers policy"
    ],
    ans: 1,
    exp: "<strong>Correct.</strong> <strong>Meeting policies</strong> in the Teams admin center control recording settings including who can record, whether recording is automatic, and (with integration) where recordings are stored."
  },
  {
    cat: "⚙️ Environment & Policies",
    q: "Which Teams admin center policy controls whether users can use third-party apps and custom apps within Teams?",
    opts: [
      "Meeting policy",
      "App permission policy",
      "App setup policy",
      "Messaging policy"
    ],
    ans: 1,
    exp: "<strong>Correct.</strong> <strong>App permission policies</strong> control which apps (Microsoft apps, third-party apps, and custom/tenant apps) are allowed or blocked for users in your organization."
  },
  {
    cat: "⚙️ Environment & Policies",
    q: "You want specific apps to be automatically pinned to the Teams navigation bar for all users in a department. What policy type should you configure?",
    opts: [
      "App permission policy",
      "App setup policy",
      "Meeting policy",
      "Calling policy"
    ],
    ans: 1,
    exp: "<strong>Correct.</strong> <strong>App setup policies</strong> allow admins to install and pin specific apps to the Teams client navigation rail for users, ensuring key apps are always visible without user action."
  },
  {
    cat: "⚙️ Environment & Policies",
    q: "An organization needs to ensure that HR team members cannot communicate with users in the Legal department due to compliance reasons. Which feature enforces this?",
    opts: [
      "Sensitivity labels",
      "Information barriers",
      "Data loss prevention (DLP) policies",
      "Conditional Access policies"
    ],
    ans: 1,
    exp: "<strong>Correct.</strong> <strong>Information barriers</strong> (now called Communication Compliance barriers) prevent specific groups of users from communicating or collaborating with each other in Teams, SharePoint, and OneDrive."
  },
  {
    cat: "⚙️ Environment & Policies",
    q: "A Teams administrator needs to see which users have specific policies assigned. What tool should they use?",
    opts: [
      "Azure AD audit logs",
      "Microsoft 365 compliance center",
      "Teams admin center > Users page or PowerShell",
      "Exchange admin center > Mail flow"
    ],
    ans: 2,
    exp: "<strong>Correct.</strong> The <strong>Teams admin center Users page</strong> shows per-user policy assignments. PowerShell cmdlets like <code>Get-CsUserPolicyAssignment</code> provide detailed policy data for bulk queries."
  },
  {
    cat: "⚙️ Environment & Policies",
    q: "What is the purpose of the 'Teams upgrade policy' in the Teams admin center?",
    opts: [
      "To schedule automatic updates to the Teams desktop client",
      "To control how and when users move from Skype for Business to Teams-only mode",
      "To upgrade team templates to newer versions",
      "To manage version compatibility between Teams and SharePoint"
    ],
    ans: 1,
    exp: "<strong>Correct.</strong> The <strong>Teams upgrade policy</strong> (coexistence mode) manages the transition from Skype for Business to Teams. Modes include Islands, SfB Only, SfB with Teams Collab, and Teams Only."

let current = 0;
let answers = new Array(questions.length).fill(null);
let answered = new Array(questions.length).fill(false);

function render() {
  const q = questions[current];
  document.getElementById('cat-pill').textContent = q.cat;
  document.getElementById('q-num').textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById('q-text').textContent = q.q;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  const keys = ['A', 'B', 'C', 'D'];
  q.opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (answered[current] ? ' disabled' : '');
    if (answered[current]) {
      if (i === q.ans) div.classList.add('correct');
      else if (i === answers[current]) div.classList.add('wrong');
    }
    div.innerHTML = `<div class="option-key">${keys[i]}</div><div class="option-text">${opt}</div>`;
    if (!answered[current]) div.onclick = () => selectAnswer(i);
    opts.appendChild(div);
  });

  const exp = document.getElementById('explanation');
  exp.innerHTML = q.exp;
  exp.className = 'explanation' + (answered[current] ? ' show' : '');

  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = !answered[current];
  document.getElementById('btn-next').textContent = current === questions.length - 1 ? 'Finish ✓' : 'Next →';

  const pct = ((current + (answered[current] ? 1 : 0)) / questions.length) * 100;
  document.getElementById('progress-fill').style.width = Math.round(pct) + '%';
  document.getElementById('progress-label').textContent = `${current + (answered[current] ? 1 : 0)} / ${questions.length}`;
}

function selectAnswer(i) {
  if (answered[current]) return;
  answers[current] = i;
  answered[current] = true;
  render();
}

function navigate(dir) {
  if (dir === 1 && current === questions.length - 1) {
    showScore();
    return;
  }
  current = Math.max(0, Math.min(questions.length - 1, current + dir));
  render();
}

function showScore() {
  document.getElementById('quiz-screen').style.display = 'none';
  const sc = document.getElementById('score-screen');
  sc.style.display = 'block';

  const correct = answers.reduce((acc, a, i) => acc + (a === questions[i].ans ? 1 : 0), 0);
  const wrong = answers.reduce((acc, a, i) => acc + (a !== null && a !== questions[i].ans ? 1 : 0), 0);
  const pct = Math.round((correct / questions.length) * 100);

  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-total').textContent = questions.length;

  let title, sub;
  if (pct >= 85) { title = '🏆 Excellent!'; sub = "You're well-prepared for the MS-700 exam!"; }
  else if (pct >= 70) { title = '👍 Good Work'; sub = 'Review the areas you missed and try again.'; }
  else { title = '📚 Keep Studying'; sub = 'Focus on the categories below and retake the quiz.'; }
  document.getElementById('score-title').textContent = title;
  document.getElementById('score-sub').textContent = sub;

  // Ring animation
  const circumference = 364.4;
  setTimeout(() => {
    document.getElementById('ring-dash').style.transition = 'stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1)';
    document.getElementById('ring-dash').style.strokeDashoffset = circumference - (circumference * pct / 100);
  }, 100);

  // Topic breakdown
  const topics = {};
  questions.forEach((q, i) => {
    if (!topics[q.cat]) topics[q.cat] = { correct: 0, total: 0 };
    topics[q.cat].total++;
    if (answers[i] === q.ans) topics[q.cat].correct++;
  });

  let html = '<h3>Performance by Category</h3>';
  Object.entries(topics).forEach(([cat, data]) => {
    const p = Math.round((data.correct / data.total) * 100);
    html += `<div class="topic-row">
      <div class="topic-name">${cat}</div>
      <div class="topic-track"><div class="topic-fill" style="width:0%" data-pct="${p}"></div></div>
      <div class="topic-score">${data.correct}/${data.total}</div>
    </div>`;
  });
  document.getElementById('topic-breakdown').innerHTML = html;

  setTimeout(() => {
    document.querySelectorAll('.topic-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 200);
}

function restartQuiz() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  answered = new Array(questions.length).fill(false);
  document.getElementById('score-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('ring-dash').style.strokeDashoffset = '364.4';
  render();
}

render();
</script>
